name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
      VITE_BASE_PATH: /AplikasiAdministrasiSMK-AR26/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Supabase Env Fallback
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] && [ -f .env ]; then
            url_line=$(grep -m1 '^VITE_SUPABASE_URL=' .env || true)
            if [ -n "$url_line" ]; then
              echo "$url_line" >> "$GITHUB_ENV"
            fi
          fi

          if [ -z "$VITE_SUPABASE_ANON_KEY" ] && [ -f .env ]; then
            key_line=$(grep -m1 '^VITE_SUPABASE_ANON_KEY=' .env || true)
            if [ -n "$key_line" ]; then
              echo "$key_line" >> "$GITHUB_ENV"
            fi
          fi

      - name: Validate Supabase Configuration
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::Supabase environment variables belum diisi. Build tetap dilanjutkan, tetapi fitur database mungkin tidak berfungsi sampai secrets diset."
          fi

      - name: Build
        run: npm run build

      - name: Enable SPA Fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
